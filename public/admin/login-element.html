<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - 工具商店</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Element Plus -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- API -->
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/admin-common.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F172A;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    /* 背景装饰 */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-2%, -2%) rotate(3deg); }
    }

    /* 网格背景 */
    body::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 20px 60px rgba(0, 0, 0, 0.3),
        0 0 40px rgba(59, 130, 246, 0.05);
      animation: cardIn 0.5s ease-out;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }

    .login-icon svg {
      width: 28px;
      height: 28px;
      color: #fff;
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #F1F5F9;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .login-header p {
      font-size: 14px;
      color: #64748B;
      font-weight: 400;
    }

    /* Element Plus 深色覆盖 */
    .login-card .el-form-item__label {
      color: #94A3B8 !important;
      font-weight: 500;
      font-size: 13px;
    }

    .login-card .el-input__wrapper {
      background: rgba(255, 255, 255, 0.06) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      box-shadow: none !important;
      border-radius: 10px !important;
      padding: 4px 12px !important;
      transition: all 0.2s ease-out;
    }

    .login-card .el-input__wrapper:hover {
      border-color: rgba(59, 130, 246, 0.4) !important;
      background: rgba(255, 255, 255, 0.08) !important;
    }

    .login-card .el-input__wrapper.is-focus {
      border-color: #3B82F6 !important;
      background: rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15) !important;
    }

    .login-card .el-input__inner {
      color: #F1F5F9 !important;
      font-size: 14px;
    }

    .login-card .el-input__inner::placeholder {
      color: #475569 !important;
    }

    .login-card .el-input__prefix .el-icon,
    .login-card .el-input__suffix .el-icon {
      color: #64748B !important;
    }

    .login-btn {
      width: 100%;
      height: 46px !important;
      border-radius: 10px !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      background: linear-gradient(135deg, #3B82F6, #2563EB) !important;
      border: none !important;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35) !important;
      transition: all 0.3s ease-out !important;
      letter-spacing: 0.5px;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.45) !important;
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: #475569;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .login-footer svg {
      width: 14px;
      height: 14px;
      color: #475569;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px;
      }
      .login-header h1 {
        font-size: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <h1>后台管理</h1>
          <p>工具商店管理系统</p>
        </div>

        <el-form label-position="top" @submit.prevent="handleLogin">
          <el-form-item label="用户名">
            <el-input v-model="username" placeholder="请输入管理员用户名" :prefix-icon="User" autocomplete="username" size="large" />
          </el-form-item>
          <el-form-item label="密码">
            <el-input v-model="password" type="password" placeholder="请输入密码" :prefix-icon="Lock" show-password autocomplete="current-password" size="large" />
          </el-form-item>
          <el-form-item style="margin-top:28px;margin-bottom:0;">
            <el-button type="primary" class="login-btn" @click="handleLogin" :loading="loading">
              <span v-if="!loading">登 录</span>
              <span v-else>登录中...</span>
            </el-button>
          </el-form-item>
        </el-form>

        <div class="login-footer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          仅限管理员访问
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    const app = createApp({
      setup() {
        const username = ref('');
        const password = ref('');
        const loading = ref(false);

        // 如果已登录直接跳转
        onMounted(() => {
          if (AdminAPI.getToken()) {
            AdminAPI.check().then(() => {
              window.location.href = '/admin/element';
            }).catch(() => {
              AdminAPI.clearToken();
            });
          }
        });

        const handleLogin = async () => {
          if (!username.value.trim() || !password.value) {
            ElementPlus.ElMessage.warning('请输入用户名和密码');
            return;
          }

          loading.value = true;
          try {
            const result = await AdminAPI.login(username.value.trim(), password.value);
            AdminAPI.setToken(result.token);
            AdminAPI.setAdminInfo(result.admin);
            ElementPlus.ElMessage.success('登录成功');
            setTimeout(() => {
              window.location.href = '/admin/element';
            }, 500);
          } catch (error) {
            ElementPlus.ElMessage.error(error.message);
          } finally {
            loading.value = false;
          }
        };

        return { username, password, loading, handleLogin, User: ElementPlusIconsVue.User, Lock: ElementPlusIconsVue.Lock };
      }
    });

    app.use(ElementPlus);
    for (var key in ElementPlusIconsVue) {
      if (ElementPlusIconsVue.hasOwnProperty(key)) {
        app.component(key, ElementPlusIconsVue[key]);
      }
    }
    app.mount('#app');
  </script>
</body>
</html>
