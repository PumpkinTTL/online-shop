<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - 工具商店</title>
  <!-- Google Fonts: Poppins + Open Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Element Plus -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="/admin/css/admin-element.css">
</head>

<body>
  <div id="app">
    <el-container style="height:100vh">
      <!-- 侧边栏 -->
      <el-aside :width="isCollapsed ? '72px' : '240px'" class="sidebar-wrap">
        <div class="sidebar-logo" :class="{ collapsed: isCollapsed }">
          <el-icon :size="26" style="color:#3B82F6;">
            <Promotion />
          </el-icon>
          <span v-if="!isCollapsed" class="logo-title">工具商店</span>
        </div>

        <el-menu :default-active="currentPage" @select="handleMenuSelect" :collapse="isCollapsed"
          :collapse-transition="true" :default-openeds="openMenus" class="sidebar-menu" background-color="transparent"
          text-color="#94A3B8" active-text-color="#3B82F6">
          <el-menu-item index="dashboard">
            <el-icon>
              <DataAnalysis />
            </el-icon>
            <template #title>仪表盘</template>
          </el-menu-item>
          <el-sub-menu index="manage">
            <template #title>
              <el-icon>
                <Grid />
              </el-icon>
              <span>业务管理</span>
            </template>
            <el-menu-item index="products">
              <el-icon>
                <Goods />
              </el-icon>
              <template #title>商品管理</template>
            </el-menu-item>
            <el-menu-item index="cardkeys">
              <el-icon>
                <Key />
              </el-icon>
              <template #title>卡密管理</template>
            </el-menu-item>
            <el-menu-item index="orders">
              <el-icon>
                <Document />
              </el-icon>
              <template #title>订单管理</template>
            </el-menu-item>
          </el-sub-menu>
          <el-sub-menu index="system">
            <template #title>
              <el-icon>
                <Setting />
              </el-icon>
              <span>系统管理</span>
            </template>
            <el-menu-item index="users">
              <el-icon>
                <User />
              </el-icon>
              <template #title>用户管理</template>
            </el-menu-item>
            <el-menu-item index="admins">
              <el-icon>
                <UserFilled />
              </el-icon>
              <template #title>管理员</template>
            </el-menu-item>
            <el-menu-item index="smsrecords">
              <el-icon>
                <Iphone />
              </el-icon>
              <template #title>接码记录</template>
            </el-menu-item>
            <el-menu-item index="ratelimits">
              <el-icon>
                <Monitor />
              </el-icon>
              <template #title>限速配置</template>
            </el-menu-item>
          </el-sub-menu>
        </el-menu>

        <!-- 侧边栏底部版本信息 -->
        <div v-if="!isCollapsed" style="padding:12px 20px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;">
          <div style="font-size:11px;color:#475569;">v2.0 Element Plus</div>
        </div>
      </el-aside>

      <!-- 右侧主体 -->
      <el-container>
        <!-- 顶部栏 -->
        <el-header class="app-header">
          <div class="header-left">
            <el-icon class="collapse-btn" @click="isCollapsed = !isCollapsed" :size="20">
              <Fold v-if="!isCollapsed" />
              <Expand v-else />
            </el-icon>
            <el-breadcrumb separator="/">
              <el-breadcrumb-item>首页</el-breadcrumb-item>
              <el-breadcrumb-item>{{ pageTitle }}</el-breadcrumb-item>
            </el-breadcrumb>
          </div>
          <div class="header-right">
            <el-tooltip content="刷新数据" placement="bottom">
              <el-button circle size="small" @click="refreshCurrentPage">
                <el-icon>
                  <Refresh />
                </el-icon>
              </el-button>
            </el-tooltip>
            <el-dropdown trigger="click" @command="handleHeaderCommand">
              <div class="user-dropdown">
                <el-avatar :size="34" class="user-avatar">{{ userInitial }}</el-avatar>
                <span class="user-name">{{ userName }}</span>
                <el-icon style="color:#94A3B8;">
                  <ArrowDown />
                </el-icon>
              </div>
              <template #dropdown>
                <el-dropdown-menu>
                  <el-dropdown-item command="password">
                    <el-icon>
                      <Lock />
                    </el-icon> 修改密码
                  </el-dropdown-item>
                  <el-dropdown-item command="logout" divided>
                    <el-icon>
                      <SwitchButton />
                    </el-icon> 退出登录
                  </el-dropdown-item>
                </el-dropdown-menu>
              </template>
            </el-dropdown>
          </div>
        </el-header>

        <!-- 内容区 -->
        <el-main class="app-main" v-loading="pageLoading">

          <!-- 仪表盘 -->
          <div v-if="currentPage === 'dashboard'">
            <div style="margin-bottom:24px;">
              <h2 style="font-size:22px;font-weight:700;color:#0F172A;margin-bottom:4px;">欢迎回来，{{ userName }}</h2>
              <p style="font-size:14px;color:#94A3B8;">以下是您的店铺概览数据</p>
            </div>
            <el-row :gutter="16">
              <el-col :xs="12" :sm="8" :md="8" :lg="4" v-for="item in statCards" :key="item.label">
                <el-card shadow="hover" class="stat-card" :body-style="{ padding: 0 }">
                  <div class="stat-card-inner" :style="{ borderLeft: '4px solid ' + item.color }">
                    <div class="stat-icon-wrap" :style="{ background: item.bg }">
                      <el-icon :size="24" :style="{ color: item.color }">
                        <component :is="item.iconEl" />
                      </el-icon>
                    </div>
                    <div class="stat-info">
                      <div class="stat-value">{{ item.value }}</div>
                      <div class="stat-label">{{ item.label }}</div>
                    </div>
                  </div>
                </el-card>
              </el-col>
            </el-row>
          </div>

          <!-- 商品管理 -->
          <div v-if="currentPage === 'products'">
            <div class="page-toolbar">
              <el-button type="primary" @click="openProductModal()">
                <el-icon>
                  <Plus />
                </el-icon> 添加商品
              </el-button>
              <el-button @click="loadProducts"><el-icon>
                  <Refresh />
                </el-icon> 刷新</el-button>
            </div>
            <el-table :data="products" v-loading="productsLoading" stripe style="width:100%">
              <el-table-column prop="id" label="ID" width="60" sortable />
              <el-table-column prop="name" label="商品名称" min-width="140" show-overflow-tooltip>
                <template #default="{ row }"><strong>{{ row.name }}</strong></template>
              </el-table-column>
              <el-table-column label="分类" width="100">
                <template #default="{ row }">
                  <el-tag size="small" :type="getProductTypeTag(row.type)">
                    {{ productTypeLabel(row.type) }}
                  </el-tag>
                </template>
              </el-table-column>
              <el-table-column label="价格" width="90" sortable>
                <template #default="{ row }">
                  <span style="color:#EF4444;font-weight:600">{{ '¥' + row.price }}</span>
                </template>
              </el-table-column>
              <el-table-column label="库存" width="70" sortable>
                <template #default="{ row }">
                  <el-tag size="small" :type="row.stock > 0 ? 'success' : 'danger'">
                    {{ row.stock || 0 }}
                  </el-tag>
                </template>
              </el-table-column>
              <el-table-column label="销量" width="80" sortable>
                <template #default="{ row }">
                  <span style="font-weight:600;color:#6366F1;">{{ row.sales || 0 }}</span>
                </template>
              </el-table-column>
              <el-table-column label="质保" width="100">
                <template #default="{ row }">{{ row.warranty || '-' }}</template>
              </el-table-column>
              <el-table-column label="接码" width="80">
                <template #default="{ row }">
                  <el-tag size="small" :type="row.isCode ? 'success' : 'info'" effect="plain">
                    {{ row.isCode ? '需要' : '否' }}
                  </el-tag>
                </template>
              </el-table-column>
              <el-table-column label="关键词" width="100">
                <template #default="{ row }">{{ row.smKeyWord || '-' }}</template>
              </el-table-column>
              <el-table-column label="兑换地址" width="140" show-overflow-tooltip>
                <template #default="{ row }">{{ row.addr || '-' }}</template>
              </el-table-column>
              <el-table-column label="注意事项" width="120" show-overflow-tooltip>
                <template #default="{ row }">
                  <el-tag v-if="row.tips" type="danger" size="small"><i class="fa-solid fa-triangle-exclamation"></i>
                    有</el-tag>
                  <span v-else style="color: #999">-</span>
                </template>
              </el-table-column>
              <el-table-column label="积分" width="80" align="center">
                <template #default="{ row }">
                  <el-tag v-if="row.credit" type="warning" size="small">{{ row.credit }}</el-tag>
                  <span v-else style="color: #999">-</span>
                </template>
              </el-table-column>
              <el-table-column label="显示" width="70" align="center">
                <template #default="{ row }">
                  <el-tag :type="row.show ? 'success' : 'info'" size="small">{{ row.show ? '是' : '否' }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="创建时间" width="160" sortable>
                <template #default="{ row }">{{ formatDate(row.createdAt) }}</template>
              </el-table-column>
              <el-table-column label="操作" width="100" fixed="right">
                <template #default="{ row }">
                  <el-tooltip content="编辑" placement="top">
                    <el-button class="action-btn action-edit" size="small" circle @click="openProductModal(row)">
                      <el-icon>
                        <Edit />
                      </el-icon>
                    </el-button>
                  </el-tooltip>
                  <el-tooltip content="删除" placement="top">
                    <el-button class="action-btn action-delete" size="small" circle
                      @click="handleDeleteProduct(row.id)">
                      <el-icon>
                        <Delete />
                      </el-icon>
                    </el-button>
                  </el-tooltip>
                </template>
              </el-table-column>
            </el-table>
          </div>

          <!-- 卡密管理 -->
          <div v-if="currentPage === 'cardkeys'">
            <div class="page-toolbar">
              <el-button type="primary" @click="openCardKeyModal()">
                <el-icon>
                  <Plus />
                </el-icon> 生成卡密
              </el-button>
              <el-button type="danger" v-if="selectedCardKeyIds.length > 0" @click="handleBatchDeleteCardKeys">
                <el-icon>
                  <Delete />
                </el-icon> {{ '批量删除 (' + selectedCardKeyIds.length + ')' }}
              </el-button>
              <div style="flex:1"></div>
              <el-select v-model="cardKeyFilter.productId" placeholder="全部商品" clearable style="width:150px"
                @change="loadCardKeys">
                <el-option v-for="p in products" :key="p.id" :label="p.name" :value="p.id" />
              </el-select>
              <el-select v-model="cardKeyFilter.status" placeholder="全部状态" clearable style="width:120px"
                @change="loadCardKeys">
                <el-option label="未使用" value="unused" />
                <el-option label="已使用" value="used" />
                <el-option label="已过期" value="expired" />
              </el-select>
              <el-button @click="loadCardKeys"><el-icon>
                  <Refresh />
                </el-icon></el-button>
            </div>

            <el-table :data="cardKeys" v-loading="cardKeysLoading" stripe style="width:100%"
              @selection-change="handleCardKeySelectionChange">
              <el-table-column type="selection" width="45" />
              <el-table-column prop="id" label="ID" width="60" sortable />
              <el-table-column label="卡密" min-width="140">
                <template #default="{ row }"><code>{{ row.code }}</code></template>
              </el-table-column>
              <el-table-column label="CDK" min-width="140">
                <template #default="{ row }">
                  <code v-if="row.CDK" style="color:#22C55E">{{ row.CDK }}</code>
                  <span v-else style="color:#94A3B8">-</span>
                </template>
              </el-table-column>
              <el-table-column label="商品" min-width="120">
                <template #default="{ row }">{{ getProductName(row.productId) }}</template>
              </el-table-column>
              <el-table-column label="状态" width="90">
                <template #default="{ row }">
                  <el-tag size="small" :type="cardStatusType(row.status)">{{ cardStatusLabel(row.status) }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="手机号" width="120">
                <template #default="{ row }">{{ row.phone || '-' }}</template>
              </el-table-column>
              <el-table-column label="创建时间" width="160" sortable>
                <template #default="{ row }">{{ formatDate(row.createdAt) }}</template>
              </el-table-column>
              <el-table-column label="操作" width="100" fixed="right">
                <template #default="{ row }">
                  <el-tooltip content="编辑CDK" placement="top">
                    <el-button class="action-btn action-edit" size="small" circle @click="openEditCDKModal(row)">
                      <el-icon>
                        <Edit />
                      </el-icon>
                    </el-button>
                  </el-tooltip>
                  <el-tooltip content="删除" placement="top">
                    <el-button class="action-btn action-delete" size="small" circle
                      @click="handleDeleteCardKey(row.id)">
                      <el-icon>
                        <Delete />
                      </el-icon>
                    </el-button>
                  </el-tooltip>
                </template>
              </el-table-column>
            </el-table>

            <div class="pagination-wrap">
              <el-pagination v-if="cardKeyTotal > cardKeyFilter.pageSize" layout="total, prev, pager, next"
                :total="cardKeyTotal" :page-size="cardKeyFilter.pageSize" v-model:current-page="cardKeyFilter.page"
                @current-change="loadCardKeys" />
            </div>
          </div>

          <!-- 订单管理 -->
          <div v-if="currentPage === 'orders'">
            <div class="page-toolbar">
              <div style="flex:1"></div>
              <el-select v-model="orderFilter.status" placeholder="全部状态" clearable style="width:120px"
                @change="loadOrders">
                <el-option label="待处理" value="pending" />
                <el-option label="已完成" value="completed" />
                <el-option label="失败" value="failed" />
              </el-select>
              <el-button @click="loadOrders"><el-icon>
                  <Refresh />
                </el-icon></el-button>
            </div>

            <el-table :data="orders" v-loading="ordersLoading" stripe style="width:100%">
              <el-table-column prop="id" label="ID" width="60" sortable />
              <el-table-column label="订单号" width="180">
                <template #default="{ row }"><code>{{ row.orderNo }}</code></template>
              </el-table-column>
              <el-table-column label="商品" min-width="120">
                <template #default="{ row }">{{ getProductName(row.productId) }}</template>
              </el-table-column>
              <el-table-column prop="contact" label="联系方式" width="140" />
              <el-table-column label="手机号" width="120">
                <template #default="{ row }">{{ row.phone || '-' }}</template>
              </el-table-column>
              <el-table-column label="验证码" width="100">
                <template #default="{ row }">{{ row.verifyCode || '-' }}</template>
              </el-table-column>
              <el-table-column label="状态" width="90">
                <template #default="{ row }">
                  <el-tag size="small" :type="orderStatusType(row.status)">{{ orderStatusLabel(row.status) }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="创建时间" width="160" sortable>
                <template #default="{ row }">{{ formatDate(row.createdAt) }}</template>
              </el-table-column>
              <el-table-column label="操作" width="70" fixed="right">
                <template #default="{ row }">
                  <el-tooltip content="删除" placement="top">
                    <el-button class="action-btn action-delete" size="small" circle @click="handleDeleteOrder(row.id)">
                      <el-icon>
                        <Delete />
                      </el-icon>
                    </el-button>
                  </el-tooltip>
                </template>
              </el-table-column>
            </el-table>

            <div class="pagination-wrap">
              <el-pagination v-if="orderTotal > orderFilter.pageSize" layout="total, prev, pager, next"
                :total="orderTotal" :page-size="orderFilter.pageSize" v-model:current-page="orderFilter.page"
                @current-change="loadOrders" />
            </div>
          </div>

          <!-- 用户管理 -->
          <div v-if="currentPage === 'users'">
            <div class="page-toolbar">
              <div style="flex:1"></div>
              <el-button @click="loadUsers"><el-icon>
                  <Refresh />
                </el-icon> 刷新</el-button>
            </div>
            <el-table :data="users" v-loading="usersLoading" stripe style="width:100%">
              <el-table-column prop="id" label="ID" width="60" sortable />
              <el-table-column label="用户名" min-width="120">
                <template #default="{ row }"><strong>{{ row.username }}</strong></template>
              </el-table-column>
              <el-table-column label="昵称" width="120">
                <template #default="{ row }">{{ row.nickname || '-' }}</template>
              </el-table-column>
              <el-table-column label="状态" width="80">
                <template #default="{ row }">
                  <el-tag size="small" :type="row.isActive ? 'success' : 'danger'">
                    {{ row.isActive ? '正常' : '禁用' }}
                  </el-tag>
                </template>
              </el-table-column>
              <el-table-column label="注册时间" width="160" sortable>
                <template #default="{ row }">{{ formatDate(row.createdAt) }}</template>
              </el-table-column>
              <el-table-column label="操作" width="140" fixed="right">
                <template #default="{ row }">
                  <el-button :type="row.isActive ? 'warning' : 'success'" size="small"
                    @click="handleToggleUser(row.id)">
                    {{ row.isActive ? '禁用' : '启用' }}
                  </el-button>
                  <el-tooltip content="删除" placement="top">
                    <el-button class="action-btn action-delete" size="small" circle @click="handleDeleteUser(row.id)">
                      <el-icon>
                        <Delete />
                      </el-icon>
                    </el-button>
                  </el-tooltip>
                </template>
              </el-table-column>
            </el-table>
          </div>

          <!-- 管理员管理 -->
          <div v-if="currentPage === 'admins'">
            <div class="page-toolbar">
              <el-button type="primary" @click="openAdminModal()">
                <el-icon>
                  <Plus />
                </el-icon> 添加管理员
              </el-button>
              <el-button @click="loadAdmins"><el-icon>
                  <Refresh />
                </el-icon> 刷新</el-button>
            </div>
            <el-table :data="admins" v-loading="adminsLoading" stripe style="width:100%">
              <el-table-column prop="id" label="ID" width="60" sortable />
              <el-table-column label="用户名" min-width="120">
                <template #default="{ row }"><strong>{{ row.username }}</strong></template>
              </el-table-column>
              <el-table-column label="昵称" width="120">
                <template #default="{ row }">{{ row.nickname || '-' }}</template>
              </el-table-column>
              <el-table-column label="角色" width="110">
                <template #default="{ row }">
                  <el-tag size="small" :type="row.role === 'super' ? 'primary' : 'info'">
                    {{ row.role === 'super' ? '超级管理员' : '管理员' }}
                  </el-tag>
                </template>
              </el-table-column>
              <el-table-column label="状态" width="80">
                <template #default="{ row }">
                  <el-tag size="small" :type="row.isActive ? 'success' : 'danger'">
                    {{ row.isActive ? '正常' : '禁用' }}
                  </el-tag>
                </template>
              </el-table-column>
              <el-table-column label="创建时间" width="160" sortable>
                <template #default="{ row }">{{ formatDate(row.createdAt) }}</template>
              </el-table-column>
              <el-table-column label="操作" width="70" fixed="right">
                <template #default="{ row }">
                  <el-tooltip content="删除" placement="top">
                    <el-button class="action-btn action-delete" size="small" circle
                      @click="handleDeleteAdmin(row.id, row.role)" :disabled="row.role === 'super'">
                      <el-icon>
                        <Delete />
                      </el-icon>
                    </el-button>
                  </el-tooltip>
                </template>
              </el-table-column>
            </el-table>
          </div>

          <!-- 接码记录 -->
          <div v-if="currentPage === 'smsrecords'">
            <div class="page-toolbar">
              <div style="flex:1"></div>
              <el-select v-model="smsRecordFilter.source" placeholder="全部来源" clearable style="width:130px"
                @change="loadSmsRecords">
                <el-option label="免费接码" value="free" />
                <el-option label="isCode商品" value="iscode" />
              </el-select>
              <el-select v-model="smsRecordFilter.status" placeholder="全部状态" clearable style="width:120px"
                @change="loadSmsRecords">
                <el-option label="使用中" value="active" />
                <el-option label="已完成" value="completed" />
                <el-option label="已释放" value="released" />
                <el-option label="已拉黑" value="blocked" />
              </el-select>
              <el-input v-model="smsRecordFilter.phone" placeholder="手机号搜索" style="width:160px" clearable
                @keyup.enter="loadSmsRecords" :prefix-icon="Search">
              </el-input>
              <el-button type="primary" @click="loadSmsRecords"><el-icon>
                  <Search />
                </el-icon></el-button>
              <el-button @click="loadSmsRecords"><el-icon>
                  <Refresh />
                </el-icon></el-button>
            </div>

            <el-table :data="smsRecords" v-loading="smsRecordLoading" stripe style="width:100%">
              <el-table-column prop="id" label="ID" width="60" sortable />
              <el-table-column label="手机号" width="130">
                <template #default="{ row }"><code>{{ row.phone }}</code></template>
              </el-table-column>
              <el-table-column label="来源" width="110">
                <template #default="{ row }">
                  <el-tag size="small" :type="smsSourceType(row.source)">{{ smsSourceLabel(row.source) }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="关键词" width="100">
                <template #default="{ row }">{{ row.keyword || '-' }}</template>
              </el-table-column>
              <el-table-column label="卡类型" width="90">
                <template #default="{ row }">{{ row.cardType || '全部' }}</template>
              </el-table-column>
              <el-table-column label="验证码" width="100">
                <template #default="{ row }">
                  <code v-if="row.verifyCode" style="color:#22C55E">{{ row.verifyCode }}</code>
                  <span v-else style="color:#94A3B8">-</span>
                </template>
              </el-table-column>
              <el-table-column label="状态" width="90">
                <template #default="{ row }">
                  <el-tag size="small" :type="smsStatusType(row.status)">{{ smsStatusLabel(row.status) }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="IP" width="130">
                <template #default="{ row }"><span style="color:#94A3B8;font-size:12px">{{ row.ip || '-'
                    }}</span></template>
              </el-table-column>
              <el-table-column label="创建时间" width="160" sortable>
                <template #default="{ row }">{{ formatDate(row.createdAt) }}</template>
              </el-table-column>
              <el-table-column label="更新时间" width="160" sortable>
                <template #default="{ row }">{{ formatDate(row.updatedAt) }}</template>
              </el-table-column>
            </el-table>

            <div class="pagination-wrap">
              <el-pagination v-if="smsRecordTotal > smsRecordFilter.pageSize" layout="total, prev, pager, next"
                :total="smsRecordTotal" :page-size="smsRecordFilter.pageSize"
                v-model:current-page="smsRecordFilter.page" @current-change="loadSmsRecords" />
            </div>
          </div>

          <!-- 限速配置 -->
          <div v-if="currentPage === 'ratelimits'">
            <div class="page-toolbar">
              <div style="flex:1">
                <h2 style="font-size:18px;font-weight:600;color:#0F172A;margin:0;">限速配置管理</h2>
              </div>
              <div style="display:flex;gap:8px;">
                <el-button @click="loadRateLimits" :icon="Refresh">刷新</el-button>
                <el-button type="primary" @click="resetRateLimits" :icon="RefreshLeft">重置为默认</el-button>
              </div>
            </div>

            <el-card shadow="never" style="margin-top:16px;">
              <el-table :data="rateLimitConfigs" v-loading="rateLimitLoading" style="width:100%">
                <el-table-column prop="name" label="配置名称" width="140" />
                <el-table-column prop="key" label="标识符" width="100" />
                <el-table-column label="时间窗口" width="140">
                  <template #default="{ row }">
                    {{ formatWindowMs(row.windowMs) }}
                  </template>
                </el-table-column>
                <el-table-column prop="maxRequests" label="最大请求数" width="100" />
                <el-table-column prop="message" label="提示信息" min-width="200" />
                <el-table-column prop="enabled" label="状态" width="100">
                  <template #default="{ row }">
                    <el-switch v-model="row.enabled" @change="toggleRateLimit(row)" />
                  </template>
                </el-table-column>
                <el-table-column label="操作" width="120" fixed="right">
                  <template #default="{ row }">
                    <el-button size="small" @click="editRateLimit(row)">编辑</el-button>
                  </template>
                </el-table-column>
              </el-table>
            </el-card>
          </div>

        </el-main>
      </el-container>
    </el-container>

    <!-- 商品编辑弹窗 -->
    <el-dialog v-model="productModalVisible" :title="editingProduct.id ? '编辑商品' : '添加商品'" width="520px"
      destroy-on-close>
      <el-form label-width="100px" label-position="right">
        <el-form-item label="商品名称" required>
          <el-input v-model="editingProduct.name" placeholder="请输入商品名称" />
        </el-form-item>
        <el-form-item label="价格" required>
          <el-input-number v-model="editingProduct.price" :min="0" :precision="2" :step="0.01" style="width:100%" />
        </el-form-item>
        <el-form-item label="描述">
          <el-input v-model="editingProduct.description" placeholder="商品描述（可选）" />
        </el-form-item>
        <el-form-item label="分类">
          <el-select v-model="editingProduct.type" style="width:100%">
            <el-option label="AI账号" value="ai" />
            <el-option label="远程服务" value="remote" />
            <el-option label="接码服务" value="sms" />
          </el-select>
        </el-form-item>
        <el-form-item label="库存">
          <el-input :model-value="editingProduct.stock || 0" disabled />
          <div class="form-tip">由卡密自动计算</div>
        </el-form-item>
        <el-form-item label="销量">
          <el-input-number v-model="editingProduct.sales" :min="0" style="width:100%" />
        </el-form-item>
        <el-form-item label="质保时间">
          <el-input v-model="editingProduct.warranty" placeholder="例如：30天、永久、1个月（可选）" />
        </el-form-item>
        <el-form-item label="需要接码">
          <el-switch v-model="editingProduct.isCode" :active-value="1" :inactive-value="0" active-text="是"
            inactive-text="否" />
        </el-form-item>
        <el-form-item label="接码关键词" v-if="editingProduct.isCode">
          <el-input v-model="editingProduct.smKeyWord" placeholder="接码平台关键词" />
        </el-form-item>
        <el-form-item label="兑换地址">
          <el-input v-model="editingProduct.addr" placeholder="CDK兑换页面地址，如 https://aisub.vip/" />
        </el-form-item>
        <el-form-item label="积分额度">
          <el-input-number v-model="editingProduct.credit" :min="0" :step="1" placeholder="可选，账号积分额度"
            style="width: 100%" />
        </el-form-item>
        <el-form-item label="注意事项">
          <el-input v-model="editingProduct.tips" type="textarea" :rows="2" placeholder="可选，购买页以红色警告展示" />
        </el-form-item>
        <el-form-item label="首页显示">
          <el-switch v-model="editingProduct.show" :active-value="1" :inactive-value="0" active-text="显示"
            inactive-text="隐藏" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="productModalVisible = false">取消</el-button>
        <el-button type="primary" @click="handleSaveProduct" :loading="saving">保存</el-button>
      </template>
    </el-dialog>

    <!-- 生成卡密弹窗 -->
    <el-dialog v-model="cardKeyModalVisible" title="添加卡密" width="560px" destroy-on-close>
      <el-form label-width="100px" label-position="right">
        <el-form-item label="选择商品" required>
          <el-select v-model="cardKeyForm.productId" placeholder="请选择商品" style="width:100%">
            <el-option v-for="p in products" :key="p.id" :label="getProductLabel(p)" :value="p.id" />
          </el-select>
        </el-form-item>
        <el-form-item label="录入方式">
          <el-radio-group v-model="cardKeyForm.mode">
            <el-radio-button label="auto">自动生成</el-radio-button>
            <el-radio-button label="manual">手动录入</el-radio-button>
          </el-radio-group>
        </el-form-item>
        <template v-if="cardKeyForm.mode === 'auto'">
          <el-form-item label="卡密前缀">
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
              <el-button v-for="(item, index) in prefixList" :key="index" size="small"
                :type="cardKeyForm.prefix === item.key ? 'primary' : 'default'" @click="cardKeyForm.prefix = item.key">
                {{ item.label + ' (' + item.key + ')' }}
              </el-button>
            </div>
            <el-input v-model="cardKeyForm.prefix" placeholder="或自定义前缀" />
            <div class="form-tip">生成格式：前缀 + XXXXX-XXXXX（10位）</div>
          </el-form-item>
          <el-form-item label="生成数量">
            <el-input-number v-model="cardKeyForm.count" :min="1" :max="100" style="width:100%" />
          </el-form-item>
        </template>
        <template v-if="cardKeyForm.mode === 'manual'">
          <el-form-item label="卡密列表">
            <el-input type="textarea" v-model="cardKeyForm.manualKeys" :autosize="{ minRows: 4, maxRows: 10 }"
              placeholder="每行输入一个卡密" />
            <div class="form-tip">已输入 <strong>{{ manualKeyCount }}</strong> 个卡密</div>
          </el-form-item>
        </template>
        <el-form-item label="CDK 列表">
          <el-input type="textarea" v-model="cardKeyForm.cdkText" :autosize="{ minRows: 3, maxRows: 8 }"
            placeholder="每行输入一个CDK（可选）" />
          <div class="form-tip">留空则不关联CDK，行数应与卡密数量一致</div>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="cardKeyModalVisible = false">取消</el-button>
        <el-button type="primary" @click="handleGenerateCardKeys" :loading="saving">提交</el-button>
      </template>
    </el-dialog>

    <!-- 编辑CDK弹窗 -->
    <el-dialog v-model="editCDKModalVisible" title="编辑 CDK" width="420px" destroy-on-close>
      <el-form label-width="100px" label-position="right">
        <el-form-item label="卡密">
          <el-input :model-value="editingCDK.code" disabled />
        </el-form-item>
        <el-form-item label="CDK 兑换码">
          <el-input v-model="editingCDK.CDK" placeholder="输入CDK兑换码" />
        </el-form-item>
        <el-form-item label="状态">
          <el-select v-model="editingCDK.status" style="width:100%">
            <el-option label="未使用" value="unused" />
            <el-option label="已使用" value="used" />
            <el-option label="已过期" value="expired" />
          </el-select>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="editCDKModalVisible = false">取消</el-button>
        <el-button type="primary" @click="handleSaveCDK" :loading="saving">保存</el-button>
      </template>
    </el-dialog>

    <!-- 添加管理员弹窗 -->
    <el-dialog v-model="adminModalVisible" title="添加管理员" width="420px" destroy-on-close>
      <el-form label-width="80px" label-position="right">
        <el-form-item label="用户名" required>
          <el-input v-model="adminForm.username" placeholder="3-20位英文、数字、下划线" />
        </el-form-item>
        <el-form-item label="密码" required>
          <el-input v-model="adminForm.password" type="password" placeholder="至少6位" show-password />
        </el-form-item>
        <el-form-item label="昵称">
          <el-input v-model="adminForm.nickname" placeholder="显示名称（可选）" />
        </el-form-item>
        <el-form-item label="角色">
          <el-select v-model="adminForm.role" style="width:100%">
            <el-option label="管理员" value="admin" />
            <el-option label="超级管理员" value="super" />
          </el-select>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="adminModalVisible = false">取消</el-button>
        <el-button type="primary" @click="handleCreateAdmin" :loading="saving">创建</el-button>
      </template>
    </el-dialog>

    <!-- 修改密码弹窗 -->
    <el-dialog v-model="showPasswordModal" title="修改密码" width="420px" destroy-on-close>
      <el-form label-width="100px" label-position="right">
        <el-form-item label="原密码" required>
          <el-input v-model="passwordForm.oldPassword" type="password" placeholder="请输入原密码" show-password />
        </el-form-item>
        <el-form-item label="新密码" required>
          <el-input v-model="passwordForm.newPassword" type="password" placeholder="至少6位" show-password />
        </el-form-item>
        <el-form-item label="确认新密码" required>
          <el-input v-model="passwordForm.confirmPassword" type="password" placeholder="再次输入新密码" show-password />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="showPasswordModal = false">取消</el-button>
        <el-button type="primary" @click="handleChangePassword" :loading="saving">确认修改</el-button>
      </template>
    </el-dialog>

    <!-- 限速配置编辑对话框 -->
    <el-dialog v-model="showRateLimitEditDialog" title="编辑限速配置" width="500px">
      <el-form :model="rateLimitEditForm" label-width="100px">
        <el-form-item label="配置名称">
          <el-input v-model="rateLimitEditForm.name" disabled />
        </el-form-item>
        <el-form-item label="时间窗口">
          <el-input-number v-model="rateLimitEditForm.windowMs" :min="1000" :step="1000" />
          <span style="margin-left:8px;color:#94A3B8;font-size:12px;">毫秒</span>
        </el-form-item>
        <el-form-item label="最大请求数">
          <el-input-number v-model="rateLimitEditForm.maxRequests" :min="1" />
          <span style="margin-left:8px;color:#94A3B8;font-size:12px;">次</span>
        </el-form-item>
        <el-form-item label="提示信息">
          <el-input v-model="rateLimitEditForm.message" placeholder="请求过于频繁时的提示信息" />
        </el-form-item>
        <el-form-item label="启用状态">
          <el-switch v-model="rateLimitEditForm.enabled" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="showRateLimitEditDialog = false">取消</el-button>
        <el-button type="primary" @click="saveRateLimitConfig" :loading="saving">保存</el-button>
      </template>
    </el-dialog>
  </div>

  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/admin-common.js"></script>
  <script src="/admin/js/admin-element.js"></script>
</body>

</html>
