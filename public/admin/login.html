<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - 工具商店</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="icon"><i class="fa-solid fa-shield-halved"></i></div>
        <h1>后台管理</h1>
        <p>工具商店管理系统</p>
      </div>

      <form @submit.prevent="handleLogin" id="loginForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" class="form-input" id="username" placeholder="请输入管理员用户名" autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <i class="fa-solid fa-right-to-bracket"></i> 登录
        </button>
      </form>

      <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #9ca3af;">
        <i class="fa-solid fa-lock"></i> 仅限管理员访问
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/admin-common.js"></script>
  <script>
    // 如果已登录，直接跳转
    if (AdminAPI.getToken()) {
      AdminAPI.check().then(() => {
        window.location.href = '/admin';
      }).catch(() => {
        AdminAPI.clearToken();
      });
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!username || !password) {
        AdminToast.warning('请输入用户名和密码');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 登录中...';

      try {
        const result = await AdminAPI.login(username, password);
        AdminAPI.setToken(result.token);
        AdminAPI.setAdminInfo(result.admin);
        AdminToast.success('登录成功');
        setTimeout(() => {
          window.location.href = '/admin';
        }, 500);
      } catch (error) {
        AdminToast.error(error.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> 登录';
      }
    });
  </script>
</body>
</html>
