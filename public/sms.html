<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接码平台 - 工具商店</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/http/api.js"></script>
  <script src="/http/user.js"></script>
  <script src="/http/pickup.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/confirmDialog.js"></script>
  <script src="/js/sms.js"></script>
  <script src="/js/captcha.js"></script>
  <script src="/js/components/app-header.js"></script>
  <script src="/js/components/captcha-modal.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css?v=20260415b">
  <link rel="stylesheet" href="/css/sms.css">
</head>

<body :class="{ 'is-iframe': isInIframe }">
  <div id="app">
    <!-- 导航栏（独立访问时显示） -->
    <app-header active-page="home" hide-in-iframe></app-header>
    <captcha-modal></captcha-modal>

    <!-- 主内容 -->
    <div class="main-container">
      <!-- 获取号码 -->
      <div class="sms-card">
        <h2 class="card-title"><i class="fa-solid fa-mobile-screen"></i> 获取号码</h2>

        <label>短信关键词 <span class="required">*</span></label>
        <input type="text" v-model="sms.keyWord" placeholder="例如：Google、淘宝" class="form-input">
        <div class="hint">短信【括号】里的名字</div>

        <label>指定号码 <span class="optional">(可选)</span></label>
        <input type="text" v-model="sms.phoneInput" placeholder="不填则随机获取" class="form-input" @input="markManualPhone">

        <!-- 当前号码 -->
        <div class="phone-box" v-if="sms.currentPhone">
          <label>当前号码</label>
          <div class="phone-row">
            <input type="text" v-model="sms.currentPhone" class="form-input phone-input" readonly>
            <button class="btn btn-icon" @click="copyPhone" title="复制"><i class="fa-solid fa-copy"></i></button>
            <button class="btn btn-sm btn-danger" @click="blockPhone" title="拉黑"><i class="fa-solid fa-ban"></i></button>
          </div>
        </div>

        <label>卡类型</label>
        <select v-model="sms.cardType" class="form-input">
          <option value="全部">全部</option>
          <option value="实卡">实卡</option>
          <option value="虚卡">虚卡</option>
        </select>

        <button class="btn btn-primary btn-get" @click="getPhone" :disabled="sms.loading">
          <i class="fa-solid fa-phone" v-if="!sms.loading"></i>
          <i class="fa-solid fa-spinner fa-spin" v-else></i>
          {{ sms.loading ? '获取中' : '获取号码' }}
        </button>

        <!-- 免责声明 -->
        <div class="disclaimer">
          <i class="fa-solid fa-exclamation-triangle"></i>
          <span>本服务仅用于测试用途，严禁用于任何非法用途</span>
        </div>
      </div>

      <!-- 短信内容 -->
      <div class="sms-card">
        <div class="sms-header">
          <h2 class="card-title"><i class="fa-solid fa-message"></i> 短信内容</h2>
          <button class="btn btn-sm btn-primary" @click="getMsg" :disabled="!sms.currentPhone || sms.smsLoading">
            <i class="fa-solid fa-sync" v-if="!sms.smsLoading"></i>
            <i class="fa-solid fa-spinner fa-spin" v-else></i>
            {{ sms.smsLoading ? '获取中' : '获取短信' }}
          </button>
        </div>

        <!-- 验证码 -->
        <div class="code-box" v-if="sms.extractedCode">
          <label>验证码</label>
          <div class="code-input-row">
            <input type="text" v-model="sms.extractedCode" class="form-input code-input" readonly>
            <button class="btn btn-icon" @click="copyCode" title="复制">
              <i class="fa-solid fa-copy"></i>
            </button>
          </div>
        </div>

        <!-- 短信原文 -->
        <div class="sms-text-box" v-if="sms.smsContent">
          <label>短信原文</label>
          <div class="sms-content">{{ sms.smsContent }}</div>
          <div class="sms-time">{{ sms.smsTime }}</div>
        </div>

        <div class="empty-state" v-else>
          <i class="fa-solid fa-inbox"></i>
          <p>暂无短信</p>
        </div>
      </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer" v-if="!isInIframe">
      <p>© 2026 工具商店 · 精选优质 AI 工具</p>
    </footer>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    const app = createApp({
      setup() {
        const isInIframe = ref(window.self !== window.top);
        const sms = ref(SmsModule.createState());

        // 代理到 SmsModule
        const getPhone = () => SmsModule.getPhone(sms, Toast);
        const getMsg = () => SmsModule.getMsg(sms, Toast);
        const releasePhone = () => SmsModule.releasePhone(sms, Toast);
        const blockPhone = () => SmsModule.blockPhone(sms, Toast);
        const copyPhone = () => SmsModule.copyPhone(sms, Toast);
        const copyCode = () => SmsModule.copyCode(sms, Toast);
        const markManualPhone = () => SmsModule.markManualPhone(sms);

        return {
          isInIframe, sms,
          getPhone, getMsg, releasePhone, blockPhone, copyPhone, copyCode, markManualPhone
        };
      }
    });

    registerAppHeader(app);
    registerCaptchaModal(app);
    app.mount('#app');
  </script>
</body>

</html>
