<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付宝支付 - 工具商店</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/components/app-header.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .pay-container {
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .pay-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    /* 商品信息 */
    .pay-product {
      padding: 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .pay-product-name {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .pay-product-amount {
      font-size: 28px;
      font-weight: 700;
      color: #ff4d4f;
    }

    .pay-product-amount .currency {
      font-size: 16px;
      font-weight: 500;
    }

    /* 二维码区域 */
    .pay-qr {
      padding: 32px 24px;
      text-align: center;
    }

    .pay-qr-title {
      font-size: 15px;
      color: #666;
      margin-bottom: 16px;
    }

    .pay-qr-title i {
      color: #1677ff;
      margin-right: 4px;
    }

    .qr-canvas-wrap {
      display: inline-block;
      padding: 16px;
      background: #fff;
      border: 2px solid #f0f0f0;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .qr-canvas-wrap canvas {
      display: block;
    }

    .pay-qr-tip {
      font-size: 13px;
      color: #999;
    }

    /* 倒计时 */
    .pay-countdown {
      margin-top: 12px;
      font-size: 14px;
      color: #ff9800;
    }

    .pay-countdown.expired {
      color: #999;
    }

    /* 支付成功 */
    .pay-success {
      padding: 40px 24px;
      text-align: center;
    }

    .pay-success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #52c41a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .pay-success-icon i {
      font-size: 32px;
      color: #fff;
    }

    .pay-success-title {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .pay-success-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }

    /* CDK 展示 */
    .cdk-card {
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .cdk-card-label {
      font-size: 13px;
      color: #52c41a;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .cdk-card-value {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cdk-card-value input {
      flex: 1;
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      font-family: monospace;
      color: #1a1a1a;
    }

    .cdk-card-value .btn-copy {
      background: #52c41a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .cdk-card-value .btn-copy:hover {
      background: #45a714;
    }

    .cdk-go-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      padding: 10px 24px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .cdk-go-btn:hover {
      background: #0958d9;
    }

    /* 无CDK */
    .no-cdk {
      background: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      text-align: center;
    }

    .no-cdk i {
      color: #fa8c16;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .no-cdk p {
      font-size: 14px;
      color: #666;
    }

    /* 加载中 */
    .pay-loading {
      padding: 60px 24px;
      text-align: center;
    }

    .pay-loading i {
      font-size: 32px;
      color: #1677ff;
      animation: spin 1s linear infinite;
    }

    .pay-loading p {
      margin-top: 12px;
      color: #666;
    }

    /* 错误 */
    .pay-error {
      padding: 40px 24px;
      text-align: center;
    }

    .pay-error i {
      font-size: 40px;
      color: #ff4d4f;
      margin-bottom: 12px;
    }

    .pay-error p {
      color: #666;
      margin-bottom: 16px;
    }

    /* 联系方式输入 */
    .pay-contact {
      padding: 16px 24px;
      border-top: 1px solid #f0f0f0;
    }

    .pay-contact label {
      font-size: 13px;
      color: #999;
      margin-bottom: 6px;
      display: block;
    }

    .pay-contact input {
      width: 100%;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    .pay-contact input:focus {
      outline: none;
      border-color: #1677ff;
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.1);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- 导航栏 -->
    <app-header active-page="home" show-auth></app-header>

    <!-- 主内容 -->
    <main class="main">
      <div class="pay-container">
        <!-- 加载中 -->
        <div class="pay-card" v-if="loading">
          <div class="pay-loading">
            <i class="fa-solid fa-circle-notch"></i>
            <p>正在创建支付订单...</p>
          </div>
        </div>

        <!-- 错误 -->
        <div class="pay-card" v-else-if="error">
          <div class="pay-error">
            <i class="fa-solid fa-circle-xmark"></i>
            <p>{{ error }}</p>
            <button class="btn btn-primary" @click="goBack">返回详情</button>
          </div>
        </div>

        <!-- 支付二维码 -->
        <div class="pay-card" v-else-if="payStatus !== 'paid'">
          <!-- 商品信息 -->
          <div class="pay-product">
            <div class="pay-product-name">{{ productName }}</div>
            <div class="pay-product-amount">
              <span class="currency">¥</span>{{ amount }}
            </div>
          </div>

          <!-- 二维码 -->
          <div class="pay-qr">
            <div class="pay-qr-title">
              <i class="fa-brands fa-alipay"></i> 请使用支付宝扫码支付
            </div>
            <div class="qr-canvas-wrap">
              <canvas id="qrcode-canvas"></canvas>
            </div>
            <div class="pay-qr-tip">二维码30分钟内有效，请尽快支付</div>
            <div class="pay-countdown" :class="{ expired: countdown <= 0 }">
              <template v-if="countdown > 0">
                <i class="fa-solid fa-clock"></i> 剩余 {{ countdownText }}
              </template>
              <template v-else>
                <i class="fa-solid fa-clock"></i> 二维码已过期
              </template>
            </div>
          </div>

          <!-- 联系方式（可选） -->
          <div class="pay-contact">
            <label>联系方式（选填，用于查询订单）</label>
            <input type="text" v-model="contact" placeholder="手机号/邮箱/QQ" @blur="saveContact">
          </div>
        </div>

        <!-- 支付成功 -->
        <div class="pay-card" v-else>
          <div class="pay-success">
            <div class="pay-success-icon">
              <i class="fa-solid fa-check"></i>
            </div>
            <div class="pay-success-title">支付成功</div>
            <div class="pay-success-desc">{{ productName }}</div>

            <!-- CDK -->
            <div class="cdk-card" v-if="cdKey">
              <div class="cdk-card-label">
                <i class="fa-solid fa-key"></i> 兑换码 (CDK)
              </div>
              <div class="cdk-card-value">
                <input type="text" :value="cdKey" readonly>
                <button class="btn-copy" @click="copyCDK">
                  <i class="fa-solid fa-copy"></i> 复制
                </button>
              </div>
              <button class="cdk-go-btn" @click="goToRedeem">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> 前往兑换
              </button>
            </div>

            <!-- 无CDK -->
            <div class="no-cdk" v-else>
              <i class="fa-solid fa-triangle-exclamation"></i>
              <p>兑换码暂时缺货，请联系客服获取</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, onMounted, onUnmounted, computed, nextTick, watch } = Vue;

    const app = createApp({
      setup() {
        const loading = ref(true);
        const error = ref('');
        const orderNo = ref('');
        const qrCode = ref('');
        const amount = ref('');
        const productName = ref('');
        const payStatus = ref('pending');
        const cdKey = ref('');
        const contact = ref('');
        const countdown = ref(0);

        let pollTimer = null;
        let countdownTimer = null;

        // 获取URL参数
        const getUrlParam = (name) => {
          return new URLSearchParams(window.location.search).get(name);
        };

        // 倒计时文本
        const countdownText = computed(() => {
          const m = Math.floor(countdown.value / 60);
          const s = countdown.value % 60;
          return `${m}分${s.toString().padStart(2, '0')}秒`;
        });

        // 生成二维码
        const generateQR = async (text) => {
          await nextTick();
          const canvas = document.getElementById('qrcode-canvas');
          if (canvas && text) {
            try {
              await QRCode.toCanvas(canvas, text, {
                width: 200,
                margin: 1,
                color: { dark: '#000000', light: '#ffffff' }
              });
            } catch (e) {
              console.error('二维码生成失败:', e);
            }
          }
        };

        // 创建支付订单
        const createPayment = async () => {
          const productId = getUrlParam('productId');
          if (!productId) {
            error.value = '缺少商品信息';
            loading.value = false;
            return;
          }

          // 读取保存的联系方式
          const savedContact = localStorage.getItem('pay_contact') || '';
          contact.value = savedContact;

          try {
            const res = await axios.post('/api/payment/create', {
              productId: parseInt(productId),
              contact: savedContact || undefined,
            });
            orderNo.value = res.data.orderNo;
            qrCode.value = res.data.qrCode;
            amount.value = res.data.amount;
            productName.value = res.data.productName;

            // 生成二维码
            await generateQR(res.data.qrCode);

            // 设置倒计时
            const expiredAt = new Date(res.data.expiredAt);
            countdown.value = Math.max(0, Math.floor((expiredAt - Date.now()) / 1000));
            startCountdown();

            // 开始轮询支付状态
            startPolling();
          } catch (err) {
            error.value = err.response?.data?.error || '创建支付订单失败';
          } finally {
            loading.value = false;
          }
        };

        // 轮询支付状态
        const startPolling = () => {
          pollTimer = setInterval(async () => {
            if (!orderNo.value || payStatus.value === 'paid') return;
            try {
              const res = await axios.get('/api/payment/status', {
                params: { orderNo: orderNo.value },
              });
              if (res.data.status === 'paid') {
                payStatus.value = 'paid';
                cdKey.value = res.data.cdKey;
                stopPolling();
                Toast.success('支付成功！');
              }
            } catch (e) {
              // 轮询失败静默处理
            }
          }, 3000);
        };

        const stopPolling = () => {
          if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
          }
        };

        // 倒计时
        const startCountdown = () => {
          countdownTimer = setInterval(() => {
            if (countdown.value > 0) {
              countdown.value--;
              if (countdown.value <= 0) {
                payStatus.value = 'expired';
                stopPolling();
              }
            }
          }, 1000);
        };

        // 保存联系方式
        const saveContact = () => {
          if (contact.value.trim()) {
            localStorage.setItem('pay_contact', contact.value.trim());
            // 更新到后端
            if (orderNo.value) {
              axios.post('/api/payment/update-contact', {
                orderNo: orderNo.value,
                contact: contact.value.trim(),
              }).catch(() => {});
            }
          }
        };

        // 复制CDK
        const copyCDK = () => {
          if (cdKey.value) {
            navigator.clipboard.writeText(cdKey.value).then(() => {
              Toast.success('兑换码已复制');
            }).catch(() => {
              const input = document.querySelector('.cdk-card-value input');
              if (input) {
                input.select();
                document.execCommand('copy');
                Toast.success('兑换码已复制');
              }
            });
          }
        };

        // 前往兑换
        const goToRedeem = () => {
          window.open('https://aisub.vip/', '_blank');
        };

        // 返回
        const goBack = () => {
          const productId = getUrlParam('productId');
          if (productId) {
            window.location.href = `/detail.html?id=${productId}`;
          } else {
            window.location.href = '/';
          }
        };

        onMounted(() => {
          createPayment();
        });

        onUnmounted(() => {
          stopPolling();
          if (countdownTimer) clearInterval(countdownTimer);
        });

        return {
          loading, error, orderNo, qrCode, amount, productName,
          payStatus, cdKey, contact, countdown, countdownText,
          saveContact, copyCDK, goToRedeem, goBack,
        };
      }
    });

    registerAppHeader(app);
    app.mount('#app');
  </script>
</body>

</html>
