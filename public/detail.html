<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品详情 - 工具商店</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/js/toast.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/detail.css">
</head>

<body>
  <div id="app">
    <!-- 导航栏 -->
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-left">
          <a href="/" class="brand" @click.prevent="goHome">
            <div class="brand-icon"><i class="fa-solid fa-bolt"></i></div>
            <span>工具商店</span>
          </a>
          <div class="nav-menu">
            <a href="/" class="nav-link">
              <i class="fa-solid fa-house"></i> 首页
            </a>
            <a href="/pickup.html" class="nav-link">
              <i class="fa-solid fa-box-open"></i> 提货
            </a>
          </div>
        </div>
        <div class="nav-links">
          <!-- 未登录 -->
          <button class="btn btn-primary" @click="showAuthModal" v-if="!isLoggedIn">
            <i class="fa-solid fa-user"></i> 登录
          </button>
          <!-- 已登录 -->
          <div class="user-info" v-else>
            <div class="user-avatar">
              <i class="fa-solid fa-user"></i>
            </div>
            <span class="user-name">{{ currentUser?.username || '用户' }}</span>
            <button class="btn btn-ghost btn-sm" @click="logout" title="退出登录">
              <i class="fa-solid fa-right-from-bracket"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- 主内容 -->
    <main class="main">
      <div class="detail-container">
        <!-- 加载中 -->
        <div class="loading-state" v-if="loading">
          <i class="fa-solid fa-circle-notch"></i>
          <p>加载中...</p>
        </div>

        <!-- 错误 -->
        <div class="error-state" v-else-if="error">
          <i class="fa-solid fa-exclamation-circle"></i>
          <p>{{ error }}</p>
          <button class="btn btn-primary" @click="goHome">返回首页</button>
        </div>

        <!-- 产品详情 -->
        <template v-else-if="product">
          <!-- 顶部卡片 -->
          <div class="detail-card">
            <!-- 商品封面 -->
            <div class="product-cover" style="background: url('/assets/bg.png') center/cover no-repeat;">
              <div class="cover-overlay">
                <div class="product-badge">
                  <i class="fa-solid fa-fire"></i> 热门
                </div>
              </div>
            </div>

            <!-- 商品信息 -->
            <div class="product-info">
              <h1 class="product-name">{{ product.name }}</h1>
              <p class="product-desc">{{ product.description || '特惠渠道，无质保，且用且珍惜' }}</p>

              <!-- 价格标签 -->
              <div class="price-tag">
                <span class="price-currency">¥</span>
                <span class="price-amount">{{ product.price }}</span>
                <span class="price-period">/月</span>
              </div>
            </div>
          </div>

          <!-- 兑换卡片 -->
          <div class="action-card" v-if="!redeemResult">
            <div class="card-header">
              <i class="fa-solid fa-key"></i>
              <span>卡密兑换</span>
            </div>
            <div class="card-body">
              <div class="input-group">
                <input type="text" class="form-input" v-model="redeemCode" placeholder="请输入卡密"
                  @keyup.enter="handleRedeem">
                <button class="btn btn-primary" @click="handleRedeem" :disabled="redeeming">
                  <i class="fa-solid fa-check" v-if="!redeeming"></i>
                  <i class="fa-solid fa-spinner fa-spin" v-else></i>
                  {{ redeeming ? '兑换中' : '兑换' }}
                </button>
              </div>
              <a href="https://68n.cn/xZSmW" target="_blank" class="buy-link">
                <i class="fa-solid fa-shopping-cart"></i>
                没有卡密？点击购买
              </a>
            </div>
          </div>

          <!-- 兑换成功卡片 -->
          <div class="success-card" v-if="redeemResult">
            <div class="success-header">
              <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
              </div>
              <h3 class="success-title">兑换成功</h3>
              <p class="success-desc">请复制兑换码前往网站完成兑换</p>
            </div>
            <div class="cdk-box">
              <div class="cdk-label">兑换码 (CDK)</div>
              <div class="cdk-row">
                <input type="text" class="cdk-input" :value="redeemResult.CDK" readonly>
                <button class="btn btn-primary btn-copy" @click="copyCDK">
                  <i class="fa-solid fa-copy"></i> 复制
                </button>
              </div>
            </div>
            <div class="success-actions">
              <button class="btn btn-primary btn-go" @click="goToRedeem">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> 前往兑换
              </button>
              <div class="redeem-url-box">
                <input type="text" class="redeem-url-input" value="https://aisub.vip/" readonly>
                <button class="btn btn-ghost btn-copy-url" @click="copyRedeemUrl">
                  <i class="fa-solid fa-copy"></i> 复制网址
                </button>
              </div>
              <p class="success-tip">
                <i class="fa-solid fa-info-circle"></i>
                若无法跳转，请复制网址到浏览器打开，兑换码仅可使用一次
              </p>
            </div>
          </div>

          <!-- 产品特点 -->
          <div class="features-card">
            <div class="card-header">
              <i class="fa-solid fa-sparkles"></i>
              <span>产品特点</span>
            </div>
            <div class="features-grid">
              <div class="feature-item">
                <div class="feature-icon">
                  <i class="fa-solid fa-tags"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">特惠价格</div>
                  <div class="feature-desc">渠道专享优惠</div>
                </div>
              </div>
              <div class="feature-item">
                <div class="feature-icon">
                  <i class="fa-solid fa-bolt"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">即开即用</div>
                  <div class="feature-desc">快速上手使用</div>
                </div>
              </div>
              <div class="feature-item">
                <div class="feature-icon">
                  <i class="fa-solid fa-clock"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">珍惜使用</div>
                  <div class="feature-desc">稳定可靠服务</div>
                </div>
              </div>
              <div class="feature-item warning">
                <div class="feature-icon">
                  <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">无质保</div>
                  <div class="feature-desc">售后自理</div>
                </div>
              </div>
            </div>
          </div>

          <!-- 温馨提示 -->
          <div class="notice-card">
            <div class="notice-icon">
              <i class="fa-solid fa-info-circle"></i>
            </div>
            <div class="notice-content">
              <div class="notice-title">温馨提示</div>
              <div class="notice-text">
                本产品为特惠渠道商品，不提供质保服务。购买前请仔细了解产品特性，确认符合您的需求。如有疑问请联系客服。
              </div>
            </div>
          </div>
        </template>

        <!-- 产品不存在 -->
        <div class="error-state" v-else>
          <i class="fa-solid fa-box-open"></i>
          <p>产品不存在</p>
          <button class="btn btn-primary" @click="goHome">返回首页</button>
        </div>
      </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
      <p>© 2026 工具商店 · 精选优质 AI 工具</p>
    </footer>

    <!-- 登录注册弹窗 -->
    <div class="modal-overlay" v-if="authModalVisible" @click.self="closeAuthModal">
      <div class="auth-modal">
        <div class="auth-header">
          <h3>{{ isLogin ? '登录' : '注册' }}</h3>
          <button class="modal-close" @click="closeAuthModal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="auth-tabs">
          <button :class="['auth-tab', { active: isLogin }]" @click="isLogin = true">登录</button>
          <button :class="['auth-tab', { active: !isLogin }]" @click="isLogin = false">注册</button>
        </div>

        <div class="auth-form">
          <div class="form-group">
            <label><i class="fa-solid fa-user"></i> 用户名</label>
            <input type="text" v-model="authForm.username" placeholder="3-20位英文、数字、下划线" class="form-input">
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-lock"></i> 密码</label>
            <input type="password" v-model="authForm.password" placeholder="至少6位" class="form-input">
          </div>
          <div class="form-group" v-if="!isLogin">
            <label><i class="fa-solid fa-lock"></i> 确认密码</label>
            <input type="password" v-model="authForm.confirmPassword" placeholder="再次输入密码" class="form-input">
          </div>

          <button class="btn btn-primary btn-block" @click="handleAuth" :disabled="authLoading">
            <i class="fa-solid fa-spinner fa-spin" v-if="authLoading"></i>
            {{ authLoading ? '处理中...' : (isLogin ? '登录' : '注册') }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        // 状态
        const product = ref(null);
        const loading = ref(true);
        const error = ref('');
        const redeemCode = ref('');
        const redeeming = ref(false);
        const redeemResult = ref(null);
        const isLoggedIn = ref(false);
        const currentUser = ref(null);

        // 登录注册相关
        const authModalVisible = ref(false);
        const isLogin = ref(true);
        const authLoading = ref(false);
        const authForm = ref({
          username: '',
          password: '',
          confirmPassword: ''
        });

        // 用户名验证
        const USERNAME_REGEX = /^[a-zA-Z0-9_]{3,20}$/;

        // 获取 URL 参数
        const getUrlParam = (name) => {
          const urlParams = new URLSearchParams(window.location.search);
          return urlParams.get(name);
        };

        // 加载商品
        const loadProduct = async () => {
          const productId = getUrlParam('id');

          if (!productId) {
            error.value = '产品不存在';
            loading.value = false;
            return;
          }

          try {
            const response = await axios.get(`/api/products/${productId}`);
            product.value = response.data;

            if (!product.value) {
              error.value = '产品不存在';
            } else {
              document.title = product.value.name + ' - 工具商店';
            }
          } catch (err) {
            error.value = '加载失败';
          } finally {
            loading.value = false;
          }
        };

        // 兑换卡密
        const handleRedeem = async () => {
          if (!redeemCode.value.trim()) {
            Toast.warning('请输入卡密');
            return;
          }

          redeeming.value = true;
          try {
            const productId = getUrlParam('id');
            const response = await axios.post('/api/pickup/redeem', {
              code: redeemCode.value.trim(),
              productId: productId,
            });
            redeemResult.value = response.data;
            Toast.success('兑换成功！请复制兑换码前往兑换');
          } catch (err) {
            Toast.error(err.response?.data?.error || err.message || '兑换失败');
          } finally {
            redeeming.value = false;
          }
        };

        // 复制CDK
        const copyCDK = () => {
          if (redeemResult.value && redeemResult.value.CDK) {
            navigator.clipboard.writeText(redeemResult.value.CDK).then(() => {
              Toast.success('兑换码已复制到剪贴板');
            }).catch(() => {
              const input = document.querySelector('.cdk-input');
              if (input) {
                input.select();
                document.execCommand('copy');
                Toast.success('兑换码已复制到剪贴板');
              }
            });
          }
        };

        // 前往兑换网站
        const goToRedeem = () => {
          window.open('https://aisub.vip/', '_blank');
        };

        // 复制兑换网址
        const copyRedeemUrl = () => {
          navigator.clipboard.writeText('https://aisub.vip/').then(() => {
            Toast.success('网址已复制到剪贴板');
          }).catch(() => {
            const input = document.querySelector('.redeem-url-input');
            if (input) {
              input.select();
              document.execCommand('copy');
              Toast.success('网址已复制到剪贴板');
            }
          });
        };

        // 登录注册相关方法
        const showAuthModal = () => {
          authModalVisible.value = true;
          authForm.value = { username: '', password: '', confirmPassword: '' };
        };

        const closeAuthModal = () => {
          authModalVisible.value = false;
          authForm.value = { username: '', password: '', confirmPassword: '' };
        };

        const handleAuth = async () => {
          if (!authForm.value.username.trim()) {
            Toast.warning('请输入用户名');
            return;
          }
          if (!USERNAME_REGEX.test(authForm.value.username)) {
            Toast.warning('用户名只能包含英文、数字、下划线，长度3-20位');
            return;
          }
          if (!authForm.value.password) {
            Toast.warning('请输入密码');
            return;
          }
          if (authForm.value.password.length < 6) {
            Toast.warning('密码长度至少6位');
            return;
          }
          if (!isLogin.value) {
            if (!authForm.value.confirmPassword) {
              Toast.warning('请确认密码');
              return;
            }
            if (authForm.value.password !== authForm.value.confirmPassword) {
              Toast.warning('两次密码不一致');
              return;
            }
          }

          authLoading.value = true;
          try {
            const url = isLogin.value ? '/api/users/login' : '/api/users/register';
            const response = await axios.post(url, {
              username: authForm.value.username,
              password: authForm.value.password
            });

            const { user } = response.data;
            currentUser.value = user;
            isLoggedIn.value = true;
            localStorage.setItem('user', JSON.stringify(user));

            Toast.success(isLogin.value ? '登录成功' : '注册成功');
            closeAuthModal();
          } catch (error) {
            console.error('认证错误:', error);
            Toast.error(error.response?.data?.error || error.message || '操作失败');
          } finally {
            authLoading.value = false;
          }
        };

        const logout = async () => {
          try {
            await axios.post('/api/users/logout');
          } catch (e) { }
          localStorage.removeItem('user');
          isLoggedIn.value = false;
          currentUser.value = null;
          Toast.info('已退出登录');
        };

        const checkLogin = async () => {
          const user = JSON.parse(localStorage.getItem('user') || 'null');
          if (user) {
            currentUser.value = user;
            isLoggedIn.value = true;
            try {
              const response = await axios.get('/api/users/me');
              currentUser.value = response.data;
              localStorage.setItem('user', JSON.stringify(response.data));
            } catch (error) {
              localStorage.removeItem('user');
              isLoggedIn.value = false;
              currentUser.value = null;
            }
          }
        };

        const goHome = () => { window.location.href = '/'; };

        onMounted(() => {
          checkLogin();
          loadProduct();
        });

        return {
          product, loading, error, redeemCode, redeeming, redeemResult,
          isLoggedIn, currentUser, authModalVisible, isLogin, authLoading, authForm,
          handleRedeem, copyCDK, goToRedeem, copyRedeemUrl, goHome, showAuthModal, closeAuthModal, handleAuth, logout
        };
      }
    }).mount('#app');
  </script>
</body>

</html>
