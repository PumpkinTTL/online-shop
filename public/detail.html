<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品详情 - 工具商店</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/detail.css">
</head>
<body>
  <div id="app">
    <!-- 导航栏 -->
    <nav class="nav">
      <div class="nav-inner">
        <a href="/" class="brand" @click.prevent="goHome">
          <div class="brand-icon"><i class="fa-solid fa-bolt"></i></div>
          <span>工具商店</span>
        </a>
        <a href="/" class="back-btn" @click.prevent="goHome">
          <i class="fa-solid fa-arrow-left"></i>
          返回首页
        </a>
      </div>
    </nav>

    <!-- 主内容 -->
    <main class="main">
      <div class="product-detail">
        <!-- 加载中 -->
        <div class="loading" v-if="loading">
          <i class="fa-solid fa-circle-notch"></i>
          <p style="margin-top: 10px; font-size: 13px;">加载中...</p>
        </div>

        <!-- 错误 -->
        <div class="empty" v-else-if="error">
          <p>{{ error }}</p>
        </div>

        <!-- 产品详情 -->
        <template v-else-if="product">
          <div class="product-cover" style="background: url('/assets/bg.png') center/cover no-repeat;">
            <div class="product-badge">
              <i class="fa-solid fa-fire"></i> 热门
            </div>
          </div>
          <div class="product-info">
            <h1 class="product-name">{{ product.name }}</h1>
            <p class="product-desc">{{ product.description || '特惠渠道，无质保，且用且珍惜' }}</p>
            
            <div class="product-price-box">
              <div class="product-price">
                <span class="price-currency">¥</span>
                <span class="price-amount">{{ product.price }}</span>
                <span class="price-period">/月</span>
              </div>
            </div>

            <!-- 卡密兑换 -->
            <div class="redeem-section">
              <div class="redeem-title">
                <i class="fa-solid fa-key"></i>
                卡密兑换
              </div>
              <div class="redeem-input-group">
                <input 
                  type="text" 
                  class="redeem-input" 
                  v-model="redeemCode" 
                  placeholder="请输入卡密"
                  @keyup.enter="handleRedeem"
                >
                <button class="btn btn-primary" @click="handleRedeem" :disabled="redeeming">
                  <i class="fa-solid fa-check"></i> 
                  {{ redeeming ? '兑换中...' : '兑换' }}
                </button>
              </div>
              <a href="https://68n.cn/xZSmW" target="_blank" class="buy-link">
                <i class="fa-solid fa-shopping-cart"></i>
                没有卡密？点击购买
              </a>
            </div>

            <!-- 产品特点 -->
            <div class="features-section">
              <h3 class="features-title">产品特点</h3>
              <div class="features-list">
                <div class="feature-item">
                  <div class="feature-icon"><i class="fa-solid fa-tags"></i></div>
                  <span class="feature-text">特惠渠道价格</span>
                </div>
                <div class="feature-item">
                  <div class="feature-icon"><i class="fa-solid fa-bolt"></i></div>
                  <span class="feature-text">即开即用</span>
                </div>
                <div class="feature-item">
                  <div class="feature-icon"><i class="fa-solid fa-clock"></i></div>
                  <span class="feature-text">且用且珍惜</span>
                </div>
                <div class="feature-item">
                  <div class="feature-icon warning"><i class="fa-solid fa-triangle-exclamation"></i></div>
                  <span class="feature-text">无质保售后</span>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- 产品不存在 -->
        <div class="empty" v-else>
          <p>产品不存在</p>
        </div>
      </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
      <p>© 2026 工具商店 · 精选优质 AI 工具</p>
    </footer>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        // 状态
        const product = ref(null);
        const loading = ref(true);
        const error = ref('');
        const redeemCode = ref('');
        const redeeming = ref(false);

        // 获取 URL 参数
        const getUrlParam = (name) => {
          const urlParams = new URLSearchParams(window.location.search);
          return urlParams.get(name);
        };

        // 加载商品
        const loadProduct = async () => {
          const productId = getUrlParam('id');
          
          if (!productId) {
            error.value = '产品不存在';
            loading.value = false;
            return;
          }

          try {
            const response = await axios.get(`/api/products/${productId}`);
            product.value = response.data;
            
            if (!product.value) {
              error.value = '产品不存在';
            } else {
              document.title = product.value.name + ' - 工具商店';
            }
          } catch (err) {
            error.value = '加载失败';
          } finally {
            loading.value = false;
          }
        };

        // 兑换卡密
        const handleRedeem = async () => {
          if (!redeemCode.value.trim()) {
            alert('请输入卡密');
            return;
          }

          redeeming.value = true;
          
          // TODO: 调用后端验证卡密
          setTimeout(() => {
            alert('卡密兑换功能开发中...\n卡密: ' + redeemCode.value);
            redeeming.value = false;
          }, 1000);
        };

        const goHome = () => { window.location.href = '/'; };

        onMounted(() => {
          loadProduct();
        });

        return {
          product, loading, error, redeemCode, redeeming,
          handleRedeem, goHome
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
