<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品详情 - 工具商店</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/http/api.js"></script>
  <script src="/http/product.js"></script>
  <script src="/http/user.js"></script>
  <script src="/http/pickup.js"></script>
  <script src="/http/payment.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/confirmDialog.js"></script>
  <script src="/js/components/app-header.js"></script>
  <script src="/js/components/product-action.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/detail.css">
</head>

<body>
  <div id="app">
    <!-- 导航栏 -->
    <app-header active-page="home" show-auth></app-header>

    <!-- 主内容 -->
    <main class="main">
      <div class="detail-container">
        <!-- 加载中 -->
        <div class="loading-state" v-if="loading">
          <i class="fa-solid fa-circle-notch"></i>
          <p>加载中...</p>
        </div>

        <!-- 错误 -->
        <div class="error-state" v-else-if="error">
          <i class="fa-solid fa-exclamation-circle"></i>
          <p>{{ error }}</p>
          <button class="btn btn-primary" @click="goHome">返回首页</button>
        </div>

        <!-- 产品详情 -->
        <template v-else-if="product">
          <!-- 顶部卡片：左图右信息 -->
          <div class="detail-card product-header">
            <!-- 商品封面 -->
            <div class="product-cover" :style="{ background: product.image ? `url('/assets/images/${product.image}') center/contain no-repeat, #f8fafc` : `url('/assets/bg.png') center/contain no-repeat, #f8fafc` }">
              <div class="cover-overlay">
                <div class="product-badges">
                  <div class="product-badge">
                    <i class="fa-solid fa-fire"></i> 热门
                  </div>
                  <div class="product-badge warranty" v-if="product.warranty">
                    <i class="fa-solid fa-shield-halved"></i> 质保：{{ product.warranty }}
                  </div>
                  <div class="product-badge code-badge" v-if="product.isCode">
                    <i class="fa-solid fa-mobile-screen"></i> 接码登录
                  </div>
                  <div class="product-badge credit-badge" v-if="product.credit">
                    <i class="fa-solid fa-coins"></i> {{ product.credit }} 积分
                  </div>
                </div>
              </div>
            </div>

            <!-- 商品信息 -->
            <div class="product-info">
              <div class="product-meta">
                <h1 class="product-name">{{ product.name }}</h1>
                <p class="product-desc">{{ product.description || '特惠渠道，无质保，且用且珍惜' }}</p>

                <!-- 价格标签 -->
                <div class="price-tag">
                  <span class="price-currency">¥</span>
                  <span class="price-amount">{{ product.price }}</span>
                  <span class="price-period">/月</span>
                </div>

                <!-- 注意事项 -->
                <div class="tips-alert" v-if="product.tips">
                  <i class="fa-solid fa-triangle-exclamation"></i>
                  <span>{{ product.tips }}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 购买操作组件 -->
          <product-action :product="product" @success="onActionSuccess"></product-action>

          <!-- 产品特点 -->
          <div class="features-card">
            <div class="card-header">
              <i class="fa-solid fa-sparkles"></i>
              <span>产品特点</span>
            </div>
            <div class="features-grid">
              <div class="feature-item">
                <div class="feature-icon">
                  <i class="fa-solid fa-tags"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">特惠价格</div>
                  <div class="feature-desc">渠道专享优惠</div>
                </div>
              </div>
              <div class="feature-item">
                <div class="feature-icon">
                  <i class="fa-solid fa-bolt"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">即开即用</div>
                  <div class="feature-desc">快速上手使用</div>
                </div>
              </div>
              <div class="feature-item">
                <div class="feature-icon">
                  <i class="fa-solid fa-clock"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">珍惜使用</div>
                  <div class="feature-desc">稳定可靠服务</div>
                </div>
              </div>
              <div class="feature-item warning" v-if="!product.warranty">
                <div class="feature-icon">
                  <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">无质保</div>
                  <div class="feature-desc">售后自理</div>
                </div>
              </div>
              <div class="feature-item success" v-else>
                <div class="feature-icon">
                  <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div class="feature-content">
                  <div class="feature-title">质保保障</div>
                  <div class="feature-desc">{{ product.warranty }}</div>
                </div>
              </div>
            </div>
          </div>


          <!-- 温馨提示 -->
          <div class="notice-card">
            <div class="notice-icon">
              <i class="fa-solid fa-info-circle"></i>
            </div>
            <div class="notice-content">
              <div class="notice-title">温馨提示</div>
              <div class="notice-text">
                <template v-if="product.isCode">
                  本商品需要接码登录，购买成功后会分配登录号码，请通过接码获取验证码完成登录。请妥善保管号码和验证码信息。
                </template>
                <template v-else-if="product.warranty">
                  本产品提供质保服务，质保时间：{{ product.warranty }}。质保期内如遇问题可联系客服处理。购买前请仔细了解产品特性，确认符合您的需求。
                </template>
                <template v-else>
                  本产品为特惠渠道商品，不提供质保服务。购买前请仔细了解产品特性，确认符合您的需求。如有疑问请联系客服。
                </template>
              </div>
            </div>
          </div>
        </template>

        <!-- 产品不存在 -->
        <div class="error-state" v-else>
          <i class="fa-solid fa-box-open"></i>
          <p>产品不存在</p>
          <button class="btn btn-primary" @click="goHome">返回首页</button>
        </div>
      </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
      <p>© 2026 工具商店 · 精选优质 AI 工具</p>
    </footer>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    const app = createApp({
      setup() {
        const product = ref(null);
        const loading = ref(true);
        const error = ref('');

        const getUrlParam = (name) => {
          return new URLSearchParams(window.location.search).get(name);
        };

        const loadProduct = async () => {
          const productId = getUrlParam('id');
          if (!productId) {
            error.value = '产品不存在';
            loading.value = false;
            return;
          }
          try {
            const response = await productApi.getDetail(productId);
            product.value = response;
            if (!product.value) {
              error.value = '产品不存在';
            } else {
              document.title = product.value.name + ' - 工具商店';
            }
          } catch (err) {
            error.value = '加载失败';
          } finally {
            loading.value = false;
          }
        };

        const onActionSuccess = (result) => {
          console.log('操作成功:', result);
        };

        const goHome = () => { window.location.href = '/'; };

        onMounted(() => {
          loadProduct();
        });

        return {
          product, loading, error,
          onActionSuccess, goHome,
        };
      }
    });

    registerAppHeader(app);
    registerProductAction(app);
    app.mount('#app');
  </script>
</body>

</html>
