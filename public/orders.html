<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单中心 - 工具商店</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/http/api.js"></script>
  <script src="/http/user.js"></script>
  <script src="/http/pickup.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/components/app-header.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css?v=20260415c">
  <link rel="stylesheet" href="/css/orders.css?v=20260415c">
</head>

<body>
  <div id="app">
    <!-- 导航栏 -->
    <app-header active-page="orders" show-auth></app-header>

    <!-- 主内容 -->
    <main class="main">
      <div class="orders-page">

        <div class="page-title">
          <i class="fa-solid fa-receipt"></i>
          订单中心
        </div>

        <!-- 搜索区 -->
        <div class="search-card">
          <!-- 已登录提示 -->
          <div class="logged-in-hint" v-if="isLoggedIn">
            <i class="fa-solid fa-circle-check"></i>
            <span class="hint-text">已登录，直接查询您的订单（也可输入关键词查其他订单）</span>
            <span class="username-badge">{{ currentUser?.username }}</span>
          </div>

          <div class="search-tabs">
            <div :class="['search-tab', { active: searchType === 'contact' }]" @click="searchType = 'contact'">
              <i class="fa-solid fa-address-card"></i> 联系方式
            </div>
            <div :class="['search-tab', { active: searchType === 'orderNo' }]" @click="searchType = 'orderNo'">
              <i class="fa-solid fa-hashtag"></i> 订单号
            </div>
            <div :class="['search-tab', { active: searchType === 'phone' }]" @click="searchType = 'phone'">
              <i class="fa-solid fa-phone"></i> 手机号
            </div>
          </div>

          <div class="search-input-group">
            <div class="search-input-wrap">
              <i :class="searchIcon"></i>
              <input type="text"
                v-model="keyword"
                :placeholder="searchPlaceholder"
                @keyup.enter="doSearch"
                :disabled="loading">
            </div>
            <button class="btn-search" @click="doSearch" :disabled="loading || (!isLoggedIn && !keyword.trim())">
              <i class="fa-solid fa-spinner fa-spin" v-if="loading"></i>
              <i class="fa-solid fa-magnifying-glass" v-else></i>
              查询
            </button>
          </div>

          <!-- 状态筛选 -->
          <div class="filter-row">
            <span>状态：</span>
            <div :class="['filter-tag', { active: statusFilter === '' }]" @click="statusFilter = ''">全部</div>
            <div :class="['filter-tag', { active: statusFilter === 'completed' }]" @click="statusFilter = 'completed'">已完成</div>
            <div :class="['filter-tag', { active: statusFilter === 'pending' }]" @click="statusFilter = 'pending'">待处理</div>
            <div :class="['filter-tag', { active: statusFilter === 'failed' }]" @click="statusFilter = 'failed'">失败</div>
          </div>
        </div>

        <!-- 查询结果 -->
        <template v-if="searched">
          <div class="results-info">
            <span>共 {{ total }} 条结果</span>
            <span>第 {{ page }} / {{ totalPages }} 页</span>
          </div>

          <div class="order-list" v-if="orders.length > 0">
            <div class="order-card" v-for="order in orders" :key="order.id">
              <div class="order-card-header">
                <span class="order-no">
                  <i class="fa-solid fa-receipt"></i>
                  {{ order.orderNo }}
                </span>
                <div class="order-header-right">
                  <span class="pay-method-tag" :class="order.payMethod === 'alipay' ? 'alipay' : 'redeem'">
                    {{ order.payMethod === 'alipay' ? '支付宝' : '卡密兑换' }}
                  </span>
                  <span :class="['order-status', order.status]">
                    {{ statusText(order.status) }}
                  </span>
                </div>
              </div>
              <div class="order-card-body">
                <div class="order-info-row">
                  <span class="order-info-label">商品</span>
                  <span class="order-info-value product-name">{{ order.productName }}</span>
                </div>
                <div class="order-info-row" v-if="order.productPrice">
                  <span class="order-info-label">价格</span>
                  <span class="order-info-value copyable-field">
                    <span class="copyable-text price-text">¥{{ order.productPrice }}</span>
                  </span>
                </div>
                <div class="order-info-row">
                  <span class="order-info-label">联系方式</span>
                  <span class="order-info-value">{{ order.contact }}</span>
                </div>
                <div class="order-info-row">
                  <span class="order-info-label">手机号</span>
                  <span class="order-info-value">{{ order.phone || '-' }}</span>
                </div>
                <div class="order-info-row" v-if="order.verifyCode">
                  <span class="order-info-label">验证码</span>
                  <span class="order-info-value copyable-field">
                    <span class="copyable-text">{{ order.verifyCode }}</span>
                    <button class="btn-copy" :class="{ copied: copiedId === 'vcode-' + order.id }" @click="copyText(order.verifyCode, 'vcode-' + order.id)" title="复制验证码">
                      <i :class="copiedId === 'vcode-' + order.id ? 'fa-solid fa-check' : 'fa-regular fa-copy'"></i>
                    </button>
                  </span>
                </div>

                <!-- 凭证信息容器 -->
                <div class="credential-box" v-if="order.cardCDK || order.cardCode">
                  <div class="credential-header">
                    <i class="fa-solid fa-shield-halved"></i> 凭证信息
                  </div>
                  <div class="credential-tip">
                    <i class="fa-solid fa-circle-info"></i>
                    卡密用于查询/充值兑换码，兑换码(CDK)用于充值账号
                  </div>

                  <!-- CDK 兑换码 -->
                  <div class="cdk-highlight" v-if="order.cardCDK">
                    <span class="cdk-label">CDK 兑换码</span>
                    <span class="cdk-value">{{ order.cardCDK }}</span>
                    <button class="btn-copy" :class="{ copied: copiedId === 'cdk-' + order.id }" @click="copyText(order.cardCDK, 'cdk-' + order.id)" title="复制CDK">
                      <i :class="copiedId === 'cdk-' + order.id ? 'fa-solid fa-check' : 'fa-regular fa-copy'"></i>
                    </button>
                  </div>

                  <!-- 卡密 -->
                  <div class="card-highlight" v-if="order.cardCode">
                    <span class="card-label">卡密</span>
                    <span class="card-value">{{ order.cardCode }}</span>
                    <button class="btn-copy" :class="{ copied: copiedId === 'card-' + order.id }" @click="copyText(order.cardCode, 'card-' + order.id)" title="复制卡密">
                      <i :class="copiedId === 'card-' + order.id ? 'fa-solid fa-check' : 'fa-regular fa-copy'"></i>
                    </button>
                  </div>

                  <!-- 接码项目 -->
                  <div class="order-info-row credential-row" v-if="order.cardKeyword">
                    <span class="order-info-label">接码项目</span>
                    <span class="order-info-value">{{ order.cardKeyword }}</span>
                  </div>
                </div>

                <hr class="order-divider" v-if="order.cardCDK || order.cardCode">

                <div class="order-info-row">
                  <span class="order-info-label">创建时间</span>
                  <span class="order-info-value">{{ formatTime(order.createdAt) }}</span>
                </div>
                <div class="order-info-row" v-if="order.completedAt">
                  <span class="order-info-label">完成时间</span>
                  <span class="order-info-value">{{ formatTime(order.completedAt) }}</span>
                </div>
              </div>
            </div>
          </div>

          <div class="empty-state" v-else>
            <i class="fa-solid fa-inbox"></i>
            <p>未找到相关订单</p>
          </div>

          <!-- 分页 -->
          <div class="pagination" v-if="totalPages > 1">
            <button class="page-btn" :disabled="page <= 1" @click="goPage(page - 1)">
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <span class="page-info">{{ page }} / {{ totalPages }}</span>
            <button class="page-btn" :disabled="page >= totalPages" @click="goPage(page + 1)">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>
        </template>

        <!-- 自动加载中（已登录正在查询） -->
        <div class="auto-loading" v-if="!searched && autoSearching">
          <i class="fa-solid fa-circle-notch"></i>
          <p>正在查询您的订单...</p>
        </div>

        <!-- 首次进入的提示（未登录） -->
        <div class="empty-state" v-if="!searched && !autoSearching">
          <i class="fa-solid fa-magnifying-glass"></i>
          <p>输入联系方式、订单号或手机号查询您的订单</p>
        </div>

      </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
      <p>© 2026 工具商店 · 精选优质 AI 工具</p>
    </footer>
  </div>

  <script>
    const { createApp, ref, computed, watch, onMounted } = Vue;

    const app = createApp({
      setup() {
        // 登录状态
        const isLoggedIn = ref(false);
        const currentUser = ref(null);
        const autoSearching = ref(false);

        // 搜索
        const searchType = ref('contact');
        const keyword = ref('');
        const loading = ref(false);
        const searched = ref(false);

        // 状态筛选
        const statusFilter = ref('');

        // 复制状态
        const copiedId = ref('');

        // 结果
        const orders = ref([]);
        const total = ref(0);
        const page = ref(1);
        const pageSize = 10;

        const totalPages = computed(() => Math.max(1, Math.ceil(total.value / pageSize)));

        const searchIcon = computed(() => {
          const map = {
            contact: 'fa-solid fa-address-card',
            orderNo: 'fa-solid fa-hashtag',
            phone: 'fa-solid fa-phone',
          };
          return map[searchType.value];
        });

        const searchPlaceholder = computed(() => {
          const map = {
            contact: '输入联系方式（手机号/QQ/邮箱）',
            orderNo: '输入订单号，如 ORD20260413...',
            phone: '输入接码手机号',
          };
          return map[searchType.value];
        });

        // 切换搜索类型时清空结果
        watch(searchType, () => {
          keyword.value = '';
          searched.value = false;
          orders.value = [];
          total.value = 0;
          page.value = 1;
        });

        // 切换状态筛选时重新搜索
        watch(statusFilter, () => {
          if (searched.value) doSearch();
        });

        // 检查登录状态
        const checkLogin = async () => {
          const raw = localStorage.getItem('user');
          const user = raw && raw !== 'undefined' ? JSON.parse(raw) : null;
          if (user) {
            try {
              const response = await userApi.getMe();
              currentUser.value = response;
              isLoggedIn.value = true;
              localStorage.setItem('user', JSON.stringify(response));
            } catch (error) {
              localStorage.removeItem('user');
              isLoggedIn.value = false;
              currentUser.value = null;
            }
          }
        };

        const doSearch = async () => {
          // 确定搜索方式：已登录且 keyword 为空时用 userId 精确查
          let searchKeyword = keyword.value.trim();
          const useUserIdSearch = isLoggedIn.value && !searchKeyword && currentUser.value?.id;

          if (!useUserIdSearch && !searchKeyword) {
            Toast.warning('请输入查询关键词');
            return;
          }
          loading.value = true;
          try {
            const params = { page: page.value, pageSize };
            // 已登录且无关键词：按 userId 精确查
            if (useUserIdSearch) {
              params.userId = currentUser.value.id;
            } else {
              params[searchType.value] = searchKeyword;
            }
            if (statusFilter.value) params.status = statusFilter.value;

            const res = await pickupApi.getOrders(params);
            orders.value = res.items;
            total.value = res.total;
            searched.value = true;
          } catch (err) {
            Toast.error(err.response?.data?.error || '查询失败');
          } finally {
            loading.value = false;
          }
        };

        const goPage = (p) => {
          page.value = p;
          doSearch();
        };

        const statusText = (s) => {
          const map = { completed: '已完成', pending: '待处理', failed: '失败' };
          return map[s] || s;
        };

        const formatTime = (t) => {
          if (!t) return '';
          const d = new Date(t);
          return d.getFullYear() + '-' +
            String(d.getMonth() + 1).padStart(2, '0') + '-' +
            String(d.getDate()).padStart(2, '0') + ' ' +
            String(d.getHours()).padStart(2, '0') + ':' +
            String(d.getMinutes()).padStart(2, '0') + ':' +
            String(d.getSeconds()).padStart(2, '0');
        };

        const copyText = async (text, id) => {
          try {
            await navigator.clipboard.writeText(text);
            copiedId.value = id;
            Toast.success('已复制到剪贴板');
            setTimeout(() => { copiedId.value = ''; }, 2000);
          } catch {
            // 降级方案
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            copiedId.value = id;
            Toast.success('已复制到剪贴板');
            setTimeout(() => { copiedId.value = ''; }, 2000);
          }
        };

        // 页面加载：检查登录 → 自动查询
        onMounted(async () => {
          await checkLogin();
          if (isLoggedIn.value && currentUser.value) {
            // 已登录，直接按 userId 查询我的订单（不预填 keyword）
            autoSearching.value = true;
            await doSearch();
            autoSearching.value = false;
          }
        });

        return {
          isLoggedIn, currentUser, autoSearching,
          searchType, keyword, loading, searched,
          statusFilter, copiedId, orders, total, page, pageSize, totalPages,
          searchIcon, searchPlaceholder,
          doSearch, goPage, statusText, formatTime, copyText,
        };
      }
    });

    registerAppHeader(app);
    app.mount('#app');
  </script>
</body>

</html>
