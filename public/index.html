<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简易商品小站</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
    header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
    header h1 { font-size: 28px; }
    .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
    .product { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .product:hover { transform: translateY(-5px); }
    .product h3 { color: #2c3e50; margin-bottom: 10px; }
    .product .price { color: #e74c3c; font-size: 20px; font-weight: bold; margin: 10px 0; }
    .product .desc { color: #7f8c8d; font-size: 14px; }
    footer { text-align: center; padding: 20px; color: #7f8c8d; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>🛒 简易商品小站</h1>
  </header>
  <div class="container">
    <div class="products" id="products"></div>
  </div>
  <footer>
    <p>如有需要请联系店主</p>
  </footer>
  <script>
    fetch('/api/products')
      .then(r => r.json())
      .then(products => {
        const html = products.map(p => `
          <div class="product">
            <h3>${p.name}</h3>
            <div class="price">¥${p.price}</div>
            <div class="desc">${p.description}</div>
          </div>
        `).join('');
        document.getElementById('products').innerHTML = html;
      });
  </script>
</body>
</html>
